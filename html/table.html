<body>
    <form action="">

    <table border="2" cellspacing="0" cellpadding="10">
        <thead bgcolor="red">
            <th>Attribute</th>
            <th>Value</th>
        </thead>
        <tr>
            <td>Name</td>
            <td><input type="text" placeholder="Enter Your name" required></td>
        </tr>
        <tr>
            <td>Mobile</td>
            <td><input type="number"></td>
        </tr>
        <tr>
            <td>Email</td>

        </tr>
        <tr>
            <td>Password</td>
            <td><input type="password"></td>
        </tr>

        </tr>
        <tr>

        </tr>
        <tr>

        <tr>

        <tr>
            <td>Gender</td>

            </td>
        </tr>
        <tr>
            <td>Courses:</td>

                <input type="checkbox">FrontEnd

            </td>
        </tr>
        <tr>
            <td>Session</td>
            <td>
                <input type="text" value="2026-27" readonly>
            </td>
        </tr>
        <tr>
            <td>Degree:</td>
            <td>
                <select>
                    <option value="">BE</option>
                    <option value="">BCA</option>
                    <option value="">BCOM</option>
                    <option value="">BARTS</option>
                    <option value="">BARCH</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><button type="submit">Submit</button></td>
            <td><button type="reset">Reset</button></td>
        </tr>

    </table>
    </form>

</body>

</html>
